name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export
      - name: Build roBa Left
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=roBa_L -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Build roBa Right
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=roBa_R -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
