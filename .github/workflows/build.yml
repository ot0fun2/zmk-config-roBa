name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        uses: zmkfirmware/zmk/app/actions/setup@main

      - name: West Build (roBa_L)
        uses: zmkfirmware/zmk/app/actions/build@main
        with:
          board: seeeduino_xiao_ble
          shield: roBa_L

      - name: West Build (roBa_R)
        uses: zmkfirmware/zmk/app/actions/build@main
        with:
          board: seeeduino_xiao_ble
          shield: roBa_R

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
