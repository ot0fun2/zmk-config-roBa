name: Build ZMK (roBa)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip3 install west
          pip3 install -r zmk/scripts/requirements.txt || true

      - name: Initialize west workspace
        run: |
          west init -l config
          west update

      - name: Build Left (roBa_L)
        run: |
          west build -s zmk/app -d build/left \
            -b xiao_ble \
            -- \
            -DSHIELD=roBa_L \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Build Right (roBa_R)
        run: |
          west build -s zmk/app -d build/right \
            -b xiao_ble \
            -- \
            -DSHIELD=roBa_R \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Rename firmware
        run: |
          cp build/left/zephyr/zmk.uf2 roba_l.uf2
          cp build/right/zephyr/zmk.uf2 roba_r.uf2

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roba-firmware
          path: |
            roba_l.uf2
            roba_r.uf2
