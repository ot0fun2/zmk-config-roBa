name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules
            zephyr
            bootloader
            zmk
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
      - name: West Init
        uses: zmkfirmware/zmk-action-setup@v1
      - name: West Build (roBa_L)
        uses: zmkfirmware/zmk-action-build@v1
        with:
          board: seeeduino_xiao_ble
          shield: roBa_L
      - name: West Build (roBa_R)
        uses: zmkfirmware/zmk-action-build@v1
        with:
          board: seeeduino_xiao_ble
          shield: roBa_R
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/*.uf2
