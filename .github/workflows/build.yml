name: Build ZMK (roBa)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler wget \
            python3-dev python3-pip python3-setuptools python3-wheel \
            xz-utils file make gcc gcc-multilib g++-multilib

      - name: Install west
        run: |
          pip3 install west

      - name: Install Zephyr SDK
        run: |
          wget https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          tar xf zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          cd zephyr-sdk-0.16.5
          ./setup.sh -t all -h -c

      - name: Init west workspace
        run: |
          west init -l config
          west update

      - name: Export Zephyr
        run: |
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -d build/left \
            -b xiao_ble \
            -- \
            -DSHIELD=roBa_L \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Build Right
        run: |
          west build -s zmk/app -d build/right \
            -b xiao_ble \
            -- \
            -DSHIELD=roBa_R \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Rename firmware
        run: |
          cp build/left/zephyr/zmk.uf2 roba_left.uf2
          cp build/right/zephyr/zmk.uf2 roba_right.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: roba-firmware
          path: |
            roba_left.uf2
            roba_right.uf2
