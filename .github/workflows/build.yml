name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build Left
        run: |
          west build -s zmk/app -d build/left \
            -b xiao_ble \
            -- -DSHIELD=roBa_L \
               -DZMK_CONFIG=$GITHUB_WORKSPACE/config
          cp build/left/zephyr/zmk.uf2 roba_l.uf2

      - name: Build Right
        run: |
          west build -s zmk/app -d build/right \
            -b xiao_ble \
            -- -DSHIELD=roBa_R \
               -DZMK_CONFIG=$GITHUB_WORKSPACE/config
          cp build/right/zephyr/zmk.uf2 roba_r.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            roba_l.uf2
            roba_r.uf2
