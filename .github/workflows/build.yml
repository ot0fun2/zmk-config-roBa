name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: zmkfirmware/zmk-build-arm:stable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build roBa Left
        run: |
          west build -s zmk/app -d build/left \
            -b seeeduino_xiao_ble \
            -- -DSHIELD=roBa \
               -DZMK_CONFIG=$GITHUB_WORKSPACE/config \
               -DZMK_CONFIG_FILE=roBa_L.conf \
               -DDTC_OVERLAY_FILE=$GITHUB_WORKSPACE/config/roBa_L.overlay

          cp build/left/zephyr/zmk.uf2 roba_l.uf2

      - name: Build roBa Right
        run: |
          west build -s zmk/app -d build/right \
            -b seeeduino_xiao_ble \
            -- -DSHIELD=roBa \
               -DZMK_CONFIG=$GITHUB_WORKSPACE/config \
               -DZMK_CONFIG_FILE=roBa_R.conf \
               -DDTC_OVERLAY_FILE=$GITHUB_WORKSPACE/config/roBa_R.overlay

          cp build/right/zephyr/zmk.uf2 roba_r.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            roba_l.uf2
            roba_r.uf2
