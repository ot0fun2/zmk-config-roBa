name: Build ZMK (roBa)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install west
        run: pip3 install west

      - name: Initialize west workspace
        run: |
          west init -l config
          west update

      - name: Set Zephyr environment
        run: |
          echo "ZEPHYR_BASE=$GITHUB_WORKSPACE/zephyr" >> $GITHUB_ENV

      - name: Build Left
        run: |
          west build -s zmk/app -d build/left \
            -b xiao_ble \
            -- \
            -DSHIELD=roBa_L \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Build Right
        run: |
          west build -s zmk/app -d build/right \
            -b xiao_ble \
            -- \
            -DSHIELD=roBa_R \
            -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: roba-firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2
